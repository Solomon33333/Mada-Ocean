{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <!-- En-tête simple -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">🧠 Météo Pêche</h2>
        <div>
            <button class="btn btn-coral btn-sm me-2" onclick="load()">
                <i class="bi bi-arrow-clockwise"></i> Actualiser
            </button>
            <a href="/dashboard" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house"></i> Accueil
            </a>
        </div>
    </div>

    <!-- Carte météo simplifiée -->
    <div class="card-ocean p-4 mb-4" id="meteo-card">
        <div class="text-center">
            <div class="loading-spinner mx-auto"></div>
            <p>Chargement de la météo...</p>
        </div>
    </div>

    <!-- Message important -->
    <div class="card-ocean p-4 mb-4" id="message-important" style="display:none; background: linear-gradient(135deg, #FFF8E1, #FFF3E0); border-left: 5px solid #FF6B35;">
        <div class="d-flex align-items-center gap-3">
            <div style="font-size:3rem;">📢</div>
            <div>
                <h5 class="mb-1" style="color:#FF6B35;">Conseil du jour</h5>
                <p class="mb-0" id="conseil-principal"></p>
            </div>
        </div>
    </div>

    <!-- Poisson le plus probable -->
    <div class="card-ocean p-4 mb-4 text-center" id="top-poisson" style="display:none;">
        <h5 class="text-muted mb-3">🥇 Poisson le plus probable demain</h5>
        <div id="top-poisson-content"></div>
    </div>

    <!-- Liste des autres poissons -->
    <h5 class="text-white mb-3">📋 Autres poissons possibles</h5>
    <div id="predictions">
        <div class="text-center text-white py-5">
            <div class="loading-spinner mx-auto"></div>
            <p class="mt-3">Analyse en cours...</p>
        </div>
    </div>

    <!-- Conseils pratiques -->
    <div class="card-ocean p-4 mt-4" id="conseils" style="display:none; background:#F0FFF0; border-left: 5px solid #00A896;">
        <h5 style="color:#00A896;">💡 Conseils pour demain</h5>
        <ul class="mb-0" id="conseils-liste" style="list-style: none; padding-left: 0;"></ul>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
    /* Barres de progression épaisses et visibles */
    .progress-thick {
        height: 35px !important;
        border-radius: 20px !important;
        font-size: 1rem;
        font-weight: bold;
    }
    
    /* Cartes poissons avec bordures colorées */
    .fish-card-top {
        border: 3px solid #FFD166;
        background: linear-gradient(135deg, #FFFFF0, #FFF8E1);
    }
    
    /* Cercles de couleur pour la météo */
    .meteo-circle {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 8px;
        font-size: 2rem;
    }
    .meteo-good { background: #D4EDDA; }
    .meteo-warning { background: #FFF3CD; }
    .meteo-bad { background: #F8D7DA; }
    
    /* Texte plus grand pour lecture facile */
    .big-text { font-size: 1.2rem; }
    .huge-text { font-size: 2.5rem; font-weight: 800; }
    
    /* Étiquettes simples */
    .tag {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 0.9rem;
    }
    .tag-green { background: #D4EDDA; color: #155724; }
    .tag-orange { background: #FFF3CD; color: #856404; }
    .tag-red { background: #F8D7DA; color: #721C24; }
    .tag-blue { background: #CCE5FF; color: #004085; }
</style>

<script>
    const PRIX_MARCHE = {
        'Thon Jaune': {min: 12000, max: 22000, moyen: 18000},
        'Espadon': {min: 16000, max: 28000, moyen: 22000},
        'Maquereau': {min: 5000, max: 10000, moyen: 8000},
        'Langouste': {min: 25000, max: 45000, moyen: 35000},
        'Crabes': {min: 10000, max: 20000, moyen: 15000},
        'Poulpe': {min: 8000, max: 16000, moyen: 12000},
        'Calmar': {min: 6000, max: 12000, moyen: 9000},
    };

    const SAISONS_PECHE = {
        'Thon Jaune': {debut: 3, fin: 11, pic: [5,6,7,8,9]},
        'Espadon': {debut: 5, fin: 9, pic: [6,7,8]},
        'Maquereau': {debut: 1, fin: 12, pic: [4,5,6,7,8,9,10]},
        'Langouste': {debut: 3, fin: 8, pic: [4,5,6]},
        'Crabes': {debut: 1, fin: 12, pic: [11,12,1,2,3]},
        'Poulpe': {debut: 2, fin: 10, pic: [4,5,6,7]},
        'Calmar': {debut: 3, fin: 9, pic: [5,6,7]},
    };

    function getMeteoEmoji(vent, pluie) {
        if (pluie > 5) return '🌧️';
        if (vent > 25) return '💨';
        if (vent < 10) return '☀️';
        return '🌤️';
    }

    function getMerMessage(vent) {
        if (vent < 10) return 'Mer calme - Bon pour pêcher';
        if (vent < 20) return 'Mer un peu agitée - Prudence';
        return 'Mer agitée - Attention danger';
    }

    function getMerClass(vent) {
        if (vent < 10) return 'meteo-good';
        if (vent < 20) return 'meteo-warning';
        return 'meteo-bad';
    }

    async function load() {
        try {
            const res = await fetch('/api/predictions').then(r => r.json());
            
            if (res.success) {
                const p = res.prediction;
                const meteo = p.meteo || {};
                const vent = parseFloat(meteo.vent) || 15;
                const pluie = parseFloat(meteo.precipitation) || 0;
                
                // Carte météo simplifiée
                document.getElementById('meteo-card').innerHTML = `
                    <h5 class="text-center mb-3">🌤️ Météo demain - ${p.date_cible}</h5>
                    <div class="row g-3 text-center">
                        <div class="col-4">
                            <div class="meteo-circle ${getMerClass(vent)}">
                                <span>${getMeteoEmoji(vent, pluie)}</span>
                            </div>
                            <strong>${getMerMessage(vent)}</strong>
                        </div>
                        <div class="col-4">
                            <div class="meteo-circle meteo-good">
                                <span>🌡️</span>
                            </div>
                            <strong>${meteo.temperature_eau || '26°C'}</strong><br>
                            <small class="text-muted">Température eau</small>
                        </div>
                        <div class="col-4">
                            <div class="meteo-circle ${vent > 20 ? 'meteo-bad' : 'meteo-good'}">
                                <span>💨</span>
                            </div>
                            <strong>${meteo.vent || '15 km/h'}</strong><br>
                            <small class="text-muted">Vent</small>
                        </div>
                    </div>
                    <div class="row g-3 text-center mt-2">
                        <div class="col-3">
                            <small class="text-muted">🌙 Lune</small><br>
                            <strong>${meteo.phase_lunaire || 'Quartier'}</strong>
                        </div>
                        <div class="col-3">
                            <small class="text-muted">🌊 Vagues</small><br>
                            <strong>${meteo.hauteur_vagues || '1.2 m'}</strong>
                        </div>
                        <div class="col-3">
                            <small class="text-muted">🌧️ Pluie</small><br>
                            <strong>${meteo.precipitation || '0 mm'}</strong>
                        </div>
                        <div class="col-3">
                            <small class="text-muted">📊 Pression</small><br>
                            <strong>${meteo.pression || '1013'}</strong>
                        </div>
                    </div>
                `;
                
                // Poisson le plus probable (GRAND)
                if (p.predictions && p.predictions.length > 0) {
                    const top = p.predictions[0];
                    const prix = PRIX_MARCHE[top.espece] || {moyen: 15000, min: 10000, max: 20000};
                    
                    document.getElementById('top-poisson').style.display = 'block';
                    document.getElementById('top-poisson-content').innerHTML = `
                        <div style="font-size:5rem;">${top.icon || '🐟'}</div>
                        <h3 style="color:#FF6B35;">${top.espece}</h3>
                        <div class="huge-text" style="color:#00A896;">${top.probabilite || 0}%</div>
                        <p class="big-text">de chances d'en trouver</p>
                        <div class="d-flex justify-content-center gap-2 mt-2">
                            <span class="tag tag-green">💰 ${prix.moyen.toLocaleString()} Ar/kg</span>
                            <span class="tag tag-blue">📊 ~${top.quantite_estimee_kg || 0} kg</span>
                            ${top.probabilite >= 70 ? '<span class="tag tag-green">✅ Bonne pêche</span>' : '<span class="tag tag-orange">⚠️ Moyen</span>'}
                        </div>
                    `;
                    
                    // Message important
                    document.getElementById('message-important').style.display = 'block';
                    document.getElementById('conseil-principal').innerHTML = `
                        <strong>${top.espece}</strong> est le poisson le plus probable demain.<br>
                        Prix de vente : <strong>${prix.moyen.toLocaleString()} Ar/kg</strong>.
                        ${top.probabilite >= 70 ? '👍 Bonne journée pour pêcher !' : '⚠️ Journée moyenne, soyez patient.'}
                    `;
                }
                
                // Autres poissons (liste simple)
                if (p.predictions && p.predictions.length > 1) {
                    document.getElementById('predictions').innerHTML = p.predictions.slice(1).map((pr, i) => {
                        const prix = PRIX_MARCHE[pr.espece] || {moyen: 12000};
                        const saison = SAISONS_PECHE[pr.espece];
                        const moisActuel = new Date().getMonth() + 1;
                        const enSaison = saison ? (moisActuel >= saison.debut && moisActuel <= saison.fin) : true;
                        
                        return `
                        <div class="card-ocean p-3 mb-2">
                            <div class="d-flex align-items-center gap-3">
                                <span style="font-size:2.5rem;">${pr.icon || '🐟'}</span>
                                <div class="flex-grow-1">
                                    <strong class="big-text">${pr.espece}</strong>
                                    <div class="d-flex gap-2 mt-1 flex-wrap">
                                        <span class="tag tag-blue">💰 ${prix.moyen.toLocaleString()} Ar/kg</span>
                                        ${enSaison ? '<span class="tag tag-green">✅ En saison</span>' : '<span class="tag tag-red">❌ Hors saison</span>'}
                                    </div>
                                </div>
                                <div class="text-center">
                                    <div style="font-size:1.5rem;font-weight:800;color:#FF6B35;">${pr.probabilite}%</div>
                                    <small class="text-muted">chances</small>
                                </div>
                            </div>
                            <!-- Barre de progression -->
                            <div class="progress mt-2 progress-thick">
                                <div class="progress-bar ${pr.probabilite >= 70 ? 'bg-success' : pr.probabilite >= 45 ? 'bg-warning' : 'bg-secondary'}" 
                                     style="width: ${pr.probabilite}%;">
                                    ${pr.probabilite >= 50 ? '👍' : '👎'}
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                }
                
                // Conseils pratiques (langage simple)
                if (p.predictions && p.predictions.length > 0) {
                    document.getElementById('conseils').style.display = 'block';
                    const top = p.predictions[0];
                    const prix = PRIX_MARCHE[top.espece] || {moyen: 15000};
                    
                    const conseils = [
                        {icon: '🎯', text: `Va pêcher le <strong>${top.espece}</strong> demain`},
                        {icon: '💰', text: `Vends à <strong>${prix.moyen.toLocaleString()} Ar/kg</strong>`},
                        {icon: '⏰', text: 'Pars tôt le matin (4h-8h)'},
                        {icon: '📍', text: `Zone : <strong>${p.port || 'Large de Mahavatse'}</strong>`},
                    ];
                    
                    if (vent > 20) conseils.push({icon: '⚠️', text: 'Attention : vent fort, sois prudent'});
                    if (vent < 10) conseils.push({icon: '👍', text: 'Mer calme, bonne journée pour pêcher'});
                    if (pluie > 5) conseils.push({icon: '🌧️', text: 'Prévois une protection contre la pluie'});
                    
                    document.getElementById('conseils-liste').innerHTML = conseils.map(c => `
                        <li style="padding: 10px; border-bottom: 1px solid #ddd; font-size: 1.1rem;">
                            ${c.icon} ${c.text}
                        </li>
                    `).join('');
                }
                
                if (p.warning) {
                    showToast('⚠️ ' + p.warning, 'warning');
                }
                
            } else {
                document.getElementById('predictions').innerHTML = `
                    <div class="card-ocean p-5 text-center">
                        <div style="font-size:5rem;">🧠</div>
                        <h5>Pas assez de données</h5>
                        <p class="text-muted">Reviens plus tard</p>
                        <button class="btn btn-coral mt-3" onclick="load()">Réessayer</button>
                    </div>`;
            }
        } catch (err) {
            document.getElementById('predictions').innerHTML = `
                <div class="card-ocean p-5 text-center">
                    <div style="font-size:5rem;">❌</div>
                    <h5>Erreur</h5>
                    <p class="text-muted">${err.message}</p>
                    <button class="btn btn-coral mt-3" onclick="load()">Réessayer</button>
                </div>`;
        }
    }

    load();
    setInterval(load, 300000);
</script>
{% endblock %}
