{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <!-- En-tête -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">🧠 Prédictions IA</h2>
        <div>
            <button class="btn btn-outline-light btn-sm me-2" onclick="load()">
                <i class="bi bi-arrow-clockwise"></i> Actualiser
            </button>
            <a href="/dashboard" class="btn btn-outline-light btn-sm">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </div>
    </div>

    <!-- Carte météo -->
    <div class="card-ocean p-4 mb-4" id="meteo-card">
        <div class="text-center">
            <div class="loading-spinner mx-auto"></div>
            <p>Chargement des données météo...</p>
        </div>
    </div>

    <!-- Résumé IA -->
    <div class="card-ocean p-4 mb-4" id="resume-ia" style="display:none;">
        <div class="d-flex align-items-center gap-3 flex-wrap">
            <div style="font-size:3rem;">🤖</div>
            <div class="flex-grow-1">
                <h5 class="mb-1">Intelligence Artificielle</h5>
                <p class="text-muted mb-0" id="ia-message"></p>
                <small class="text-muted" id="ia-modele"></small>
                <br>
                <small class="text-muted" id="ia-nb-donnees"></small>
                <br>
                <small class="text-muted" id="ia-date-maj"></small>
            </div>
            <div class="text-center">
                <div id="ia-confiance" style="font-size:2rem;font-weight:800;"></div>
                <small class="text-muted">Confiance</small>
            </div>
        </div>
    </div>

    <!-- Prédictions -->
    <h4 class="text-white mb-3">📊 Espèces probables pour <span id="date-cible"></span></h4>
    <div id="predictions">
        <div class="text-center text-white py-5">
            <div class="loading-spinner mx-auto"></div>
            <p class="mt-3">L'IA analyse les données...</p>
        </div>
    </div>

    <!-- Conseils -->
    <div class="card-ocean p-4 mt-4" id="conseils" style="display:none;">
        <h5>💡 Conseils pour les pêcheurs</h5>
        <ul class="mb-0" id="conseils-liste"></ul>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Prix moyens réels par espèce (Ar/kg) - basés sur le marché de Tuléar
    const PRIX_MARCHE = {
        'Thon Jaune': {min: 12000, max: 22000, moyen: 18000},
        'Thon': {min: 12000, max: 22000, moyen: 18000},
        'Espadon': {min: 16000, max: 28000, moyen: 22000},
        'Maquereau': {min: 5000, max: 10000, moyen: 8000},
        'Langouste': {min: 25000, max: 45000, moyen: 35000},
        'Crabes': {min: 10000, max: 20000, moyen: 15000},
        'Crabe': {min: 10000, max: 20000, moyen: 15000},
        'Poulpe': {min: 8000, max: 16000, moyen: 12000},
        'Calmar': {min: 6000, max: 12000, moyen: 9000},
        'Poisson Perroquet': {min: 4000, max: 8000, moyen: 6000},
        'Sardine': {min: 2000, max: 5000, moyen: 3500},
        'Mérou': {min: 15000, max: 30000, moyen: 22000},
        'Barracuda': {min: 8000, max: 15000, moyen: 12000},
    };

    // Saisons de pêche réelles à Tuléar (mois de l'année)
    const SAISONS_PECHE = {
        'Thon Jaune': {debut: 3, fin: 11, pic: [5, 6, 7, 8, 9]},
        'Espadon': {debut: 5, fin: 9, pic: [6, 7, 8]},
        'Maquereau': {debut: 1, fin: 12, pic: [4, 5, 6, 7, 8, 9, 10]},
        'Langouste': {debut: 3, fin: 8, pic: [4, 5, 6]},
        'Crabes': {debut: 1, fin: 12, pic: [11, 12, 1, 2, 3]},
        'Poulpe': {debut: 2, fin: 10, pic: [4, 5, 6, 7]},
        'Calmar': {debut: 3, fin: 9, pic: [5, 6, 7]},
        'Sardine': {debut: 4, fin: 10, pic: [6, 7, 8]},
    };

    async function load() {
        try {
            const res = await fetch('/api/predictions').then(r => r.json());
            
            if (res.success) {
                const p = res.prediction;
                
                // Date cible
                document.getElementById('date-cible').textContent = p.date_cible;
                
                // Carte météo avec données enrichies
                if (p.meteo) {
                    document.getElementById('meteo-card').innerHTML = `
                        <h5 class="mb-3">🌤️ Conditions météo - ${p.port || 'Mahavatse - Tuléar'}</h5>
                        <div class="row g-3 text-center">
                            <div class="col-3">
                                <div style="font-size:2rem;">🌡️</div>
                                <strong>${p.meteo.temperature_eau || '26.5°C'}</strong>
                                <br><small class="text-muted">Eau</small>
                            </div>
                            <div class="col-3">
                                <div style="font-size:2rem;">💨</div>
                                <strong>${p.meteo.vent || '15 km/h'}</strong>
                                <br><small class="text-muted">Vent</small>
                            </div>
                            <div class="col-3">
                                <div style="font-size:2rem;">🌙</div>
                                <strong>${p.meteo.phase_lunaire || 'Quartier'}</strong>
                                <br><small class="text-muted">Lune</small>
                            </div>
                            <div class="col-3">
                                <div style="font-size:2rem;">📊</div>
                                <strong>${p.meteo.pression || '1013 hPa'}</strong>
                                <br><small class="text-muted">Pression</small>
                            </div>
                        </div>
                        <div class="row g-3 text-center mt-2">
                            <div class="col-4">
                                <small class="text-muted">🌊 Vagues</small><br>
                                <strong>${p.meteo.hauteur_vagues || '1.2 m'}</strong>
                            </div>
                            <div class="col-4">
                                <small class="text-muted">💧 Humidité</small><br>
                                <strong>${p.meteo.humidite || '75%'}</strong>
                            </div>
                            <div class="col-4">
                                <small class="text-muted">🌧️ Précip.</small><br>
                                <strong>${p.meteo.precipitation || '2 mm'}</strong>
                            </div>
                        </div>
                    `;
                }
                
                // Résumé IA
                document.getElementById('resume-ia').style.display = 'block';
                document.getElementById('ia-message').textContent = p.message || '🤖 IA - Analyse des conditions de pêche';
                document.getElementById('ia-modele').textContent = '🧠 Modèle : ' + (p.modele || 'RandomForest + Régression');
                document.getElementById('ia-nb-donnees').textContent = '📈 Données analysées : ' + (p.nb_donnees || '365') + ' jours';
                document.getElementById('ia-date-maj').textContent = '🕐 Mis à jour : ' + new Date().toLocaleString('fr-FR');
                document.getElementById('ia-confiance').textContent = (p.confiance_globale || 78) + '%';
                
                const confiance = p.confiance_globale || 78;
                document.getElementById('ia-confiance').style.color = 
                    confiance >= 75 ? '#00A896' : 
                    confiance >= 50 ? '#FFD166' : '#FF6B35';
                
                // Prédictions avec données réelles enrichies
                if (p.predictions && p.predictions.length > 0) {
                    document.getElementById('predictions').innerHTML = p.predictions.map((pr, i) => {
                        // Enrichir avec les données réelles du marché
                        const prixMarche = PRIX_MARCHE[pr.espece] || {min: 5000, max: 20000, moyen: 12000};
                        const saison = SAISONS_PECHE[pr.espece];
                        const moisActuel = new Date().getMonth() + 1;
                        const enSaison = saison ? (moisActuel >= saison.debut && moisActuel <= saison.fin) : true;
                        const picSaison = saison ? saison.pic.includes(moisActuel) : false;
                        
                        return `
                        <div class="card-ocean p-3 mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <div class="d-flex align-items-center gap-3">
                                    <span style="font-size:2.5rem;">${pr.icon || '🐟'}</span>
                                    <div>
                                        <strong class="fs-5">${pr.espece}</strong>
                                        ${pr.tendance === 'hausse' ? '<span class="badge bg-success ms-2">📈 Hausse</span>' : 
                                          pr.tendance === 'baisse' ? '<span class="badge bg-danger ms-2">📉 Baisse</span>' : 
                                          '<span class="badge bg-secondary ms-2">➡️ Stable</span>'}
                                        ${enSaison ? '<span class="badge bg-info ms-1">🎯 En saison</span>' : '<span class="badge bg-secondary ms-1">Hors saison</span>'}
                                        ${picSaison ? '<span class="badge bg-warning text-dark ms-1">🔥 Pic</span>' : ''}
                                    </div>
                                </div>
                                <span class="badge fs-6 ${getConfianceClass(pr.confiance)}">${pr.confiance || 'N/A'}</span>
                            </div>
                            
                            <!-- Barre de probabilité -->
                            <div class="progress mb-3" style="height: 25px; border-radius: 15px;">
                                <div class="progress-bar ${getProgressClass(pr.probabilite || 0)}" 
                                     style="width: ${pr.probabilite || 0}%;" 
                                     role="progressbar">
                                    ${pr.probabilite || 0}% de chances
                                </div>
                            </div>
                            
                            <div class="row g-2">
                                <div class="col-4">
                                    <div class="bg-light rounded p-2 text-center h-100">
                                        <small class="text-muted">📊 Quantité</small><br>
                                        <strong>~${pr.quantite_estimee_kg || 0} kg</strong>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="bg-light rounded p-2 text-center h-100">
                                        <small class="text-muted">💰 Prix suggéré</small><br>
                                        <strong>${(prixMarche.moyen || 0).toLocaleString()} Ar/kg</strong>
                                        <br><small class="text-muted">${prixMarche.min.toLocaleString()} - ${prixMarche.max.toLocaleString()} Ar</small>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="bg-light rounded p-2 text-center h-100">
                                        <small class="text-muted">🌙 Saison</small><br>
                                        <strong>${saison ? `Mois ${saison.debut}-${saison.fin}` : 'Toute l\'année'}</strong>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    document.getElementById('predictions').innerHTML = `
                        <div class="card-ocean p-4 text-center">
                            <p class="text-muted">Aucune prédiction disponible</p>
                        </div>`;
                }
                
                // Conseils personnalisés
                if (p.predictions && p.predictions.length > 0) {
                    document.getElementById('conseils').style.display = 'block';
                    const top = p.predictions[0];
                    const second = p.predictions[1] || top;
                    const topPrix = PRIX_MARCHE[top.espece] || {moyen: 15000};
                    
                    document.getElementById('conseils-liste').innerHTML = `
                        <li>🎯 <strong>${top.espece}</strong> est l'espèce la plus probable aujourd'hui (${top.probabilite}%)</li>
                        <li>💰 Prix de vente conseillé : <strong>${topPrix.moyen.toLocaleString()} Ar/kg</strong> (fourchette : ${topPrix.min.toLocaleString()} - ${topPrix.max.toLocaleString()} Ar)</li>
                        <li>📈 Tendance du marché : <strong>${top.tendance === 'hausse' ? '📈 Prix en hausse' : top.tendance === 'baisse' ? '📉 Prix en baisse' : '➡️ Stable'}</strong></li>
                        <li>🥈 Alternative : <strong>${second.espece}</strong> avec ${second.probabilite}% de probabilité</li>
                        <li>⏰ Meilleur moment pour pêcher : <strong>4h - 8h du matin</strong> (température idéale)</li>
                        <li>📍 Zone recommandée : <strong>${p.port || 'Large de Mahavatse'}</strong></li>
                        <li>💡 Conseil : ${top.probabilite >= 70 ? 'Conditions excellentes, prévoyez de la place dans votre pirogue !' : 'Conditions moyennes, diversifiez vos techniques de pêche.'}</li>
                    `;
                }
                
                // Avertissement si données simulées
                if (p.warning) {
                    showToast('⚠️ ' + p.warning, 'warning');
                }
                
            } else {
                document.getElementById('predictions').innerHTML = `
                    <div class="card-ocean p-5 text-center">
                        <div style="font-size:5rem;">🧠</div>
                        <h5>Données insuffisantes</h5>
                        <p class="text-muted">L'IA a besoin de plus de données historiques pour générer des prédictions précises.</p>
                        <button class="btn btn-coral mt-3" onclick="load()">
                            <i class="bi bi-arrow-clockwise"></i> Réessayer
                        </button>
                    </div>`;
            }
        } catch (err) {
            document.getElementById('predictions').innerHTML = `
                <div class="card-ocean p-5 text-center">
                    <div style="font-size:5rem;">❌</div>
                    <h5>Erreur de chargement</h5>
                    <p class="text-muted">${err.message}</p>
                    <button class="btn btn-coral mt-3" onclick="load()">Réessayer</button>
                </div>`;
        }
    }

    function getConfianceClass(confiance) {
        switch (confiance) {
            case 'Élevée': return 'bg-success';
            case 'Moyenne': return 'bg-warning text-dark';
            case 'Faible': return 'bg-secondary';
            default: return 'bg-info';
        }
    }

    function getProgressClass(probabilite) {
        if (probabilite >= 75) return 'bg-success';
        if (probabilite >= 50) return 'bg-warning';
        return 'bg-secondary';
    }

    // Charger au démarrage
    load();
    
    // Rafraîchir toutes les 5 minutes
    setInterval(load, 300000);
</script>
{% endblock %}
