<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Mada Océan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ocean-dark: #0B3D5C; --coral: #FF6B35; --green: #00A896; }
        body { background: linear-gradient(135deg, #0B3D5C 0%, #006494 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .card-ocean { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: #FF6B35; color: white; font-size: 3rem; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background: rgba(11,61,92,0.95);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌊 Mada Océan</a>
            <div><a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a></div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card-ocean p-4 text-center">
                    <div class="avatar" id="avatar">🐟</div>
                    <h3 class="mt-3" id="profil-nom">Chargement...</h3>
                    <p class="text-muted" id="profil-role"></p>
                    <hr>
                    <div id="profil-details"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function load() {
            const res = await fetch('/api/me').then(r=>r.json());
            if (!res.success) { window.location.href='/connexion'; return; }
            
            const u = res.user;
            document.getElementById('avatar').textContent = u.role === 'pecheur' ? '🎣' : u.role === 'admin' ? '👑' : '🏨';
            document.getElementById('profil-nom').textContent = u.prenom ? `${u.prenom} ${u.nom}` : u.nom;
            document.getElementById('profil-role').textContent = u.role === 'pecheur' ? 'Pêcheur' : u.role === 'admin' ? 'Administrateur' : 'Acheteur';
            document.getElementById('profil-details').innerHTML = `
                <p>📱 <strong>${u.telephone}</strong></p>
                <p>📧 ${u.email || 'Non renseigné'}</p>
                <p>📍 ${u.port || 'Non renseigné'}</p>
                <p>⭐ Note : <strong>${u.note || 5.0}/5</strong></p>
                <p>📅 Inscrit depuis : ${u.date_inscription || 'Récent'}</p>
            `;
        }
        load();
    </script>
</body>
</html>
